# Nightly Pre-release Workflow
#
# This workflow runs nightly to create pre-release builds from the rc branch.
#
# The workflow performs the following steps:
# 1. Checks if all required checks passed on main branch (waits for pending checks)
# 2. Syncs main branch to rc branch (fast-forward only)
# 3. Checks if there are new commits since the last v0.* tag
# 4. Creates a new tag and GitHub pre-release only if changes exist

name: Nightly pre-release

on:
  schedule:
    # Run nightly at 04:00 UTC+8 (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pull-requests: read
  checks: read
  statuses: read

env:
  TZ: UTC

jobs:
  nightly-prerelease:
    name: Create nightly pre-release
    timeout-minutes: 720
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper comparison

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if all required checks passed on main (with wait)
        id: check_main_status
        run: |
          echo "::group::Checking main branch check status"

          # Define this workflow name to avoid circular dependency
          THIS_WORKFLOW_NAME="Nightly pre-release"

          # Get the latest commit SHA from main branch
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Main branch HEAD commit: ${MAIN_SHA}"

          MAX_WAIT_SECONDS=43200  # 720 minutes = 43200 seconds
          POLL_INTERVAL=60        # Check every 60 seconds
          ELAPSED=0
          ALL_PENDING=""  # Initialize outside loop for timeout access

          while [ ${ELAPSED} -lt ${MAX_WAIT_SECONDS} ]; do
            echo ""
            echo "Checking status at $(date -u +"%Y-%m-%d %H:%M:%S UTC") (elapsed: ${ELAPSED}s)"

            # Get status checks using GitHub API
            STATUS_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${MAIN_SHA}/status")
            CURL_STATUS=$?
            if [ $CURL_STATUS -ne 0 ] || [ -z "${STATUS_RESPONSE}" ]; then
              echo "::error::Failed to fetch status from GitHub API (curl exit code: $CURL_STATUS)"
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi
            # Validate JSON
            echo "${STATUS_RESPONSE}" | jq empty 2>/dev/null || {
              echo "::error::Invalid JSON received for status from GitHub API"
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            }

            # Get check runs using GitHub API
            CHECKS_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${MAIN_SHA}/check-runs")
            CURL_STATUS=$?
            if [ $CURL_STATUS -ne 0 ] || [ -z "${CHECKS_RESPONSE}" ]; then
              echo "::error::Failed to fetch check runs from GitHub API (curl exit code: $CURL_STATUS)"
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi
            # Validate JSON
            echo "${CHECKS_RESPONSE}" | jq empty 2>/dev/null || {
              echo "::error::Invalid JSON received for check runs from GitHub API"
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            }

            # Parse combined status
            COMBINED_STATUS=$(echo "${STATUS_RESPONSE}" | jq -r '.state // "unknown"')
            echo "Combined status state: ${COMBINED_STATUS}"

            # Check for any failing status checks
            FAILING_STATUSES=$(echo "${STATUS_RESPONSE}" | jq -r --arg workflow "${THIS_WORKFLOW_NAME}" '.statuses[] | select(.state == "failure" or .state == "error") | select(.context != $workflow) | .context')
            if [ $? -ne 0 ]; then
              echo "::error::Failed to parse STATUS_RESPONSE JSON for failing statuses."
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi
            # Remove empty/whitespace-only lines
            TRIMMED_FAILING_STATUSES=$(echo "${FAILING_STATUSES}" | awk 'NF')
            if [ -n "${TRIMMED_FAILING_STATUSES}" ]; then
              echo "::error::The following status checks have failed on main:"
              echo "${TRIMMED_FAILING_STATUSES}" | while read -r context; do
                echo "::error::  - ${context}"
              done
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi

            # Check for any failing, cancelled, or timed out check runs
            FAILING_CHECKS=$(echo "${CHECKS_RESPONSE}" | jq -r --arg workflow "${THIS_WORKFLOW_NAME}" '.check_runs[] | select(.status == "completed" and (.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")) | select(.name != $workflow) | .name')
            if [ $? -ne 0 ]; then
              echo "::error::Failed to parse CHECKS_RESPONSE JSON for failing checks."
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi
            if [ -n "${FAILING_CHECKS}" ]; then
              echo "::error::The following check runs have failed on main:"
              echo "${FAILING_CHECKS}" | while read -r check; do
                echo "::error::  - ${check}"
              done
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi

            # Check for pending status checks
            PENDING_STATUSES=$(echo "${STATUS_RESPONSE}" | jq -r --arg workflow "${THIS_WORKFLOW_NAME}" '.statuses[] | select(.state == "pending") | select(.context != $workflow) | .context')
            if [ $? -ne 0 ]; then
              echo "::error::Failed to parse STATUS_RESPONSE JSON for pending statuses."
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi

            # Check for in-progress or queued check runs
            PENDING_CHECKS=$(echo "${CHECKS_RESPONSE}" | jq -r --arg workflow "${THIS_WORKFLOW_NAME}" '.check_runs[] | select(.status == "queued" or .status == "in_progress") | select(.name != $workflow) | .name')
            if [ $? -ne 0 ]; then
              echo "::error::Failed to parse CHECKS_RESPONSE JSON for pending checks."
              echo "checks_passed=false" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 1
            fi

            # Combine pending checks
            ALL_PENDING=""
            if [ -n "${PENDING_STATUSES}" ]; then
              ALL_PENDING="${PENDING_STATUSES}"
            fi
            if [ -n "${PENDING_CHECKS}" ]; then
              if [ -n "${ALL_PENDING}" ]; then
                ALL_PENDING="${ALL_PENDING}"$'\n'"${PENDING_CHECKS}"
              else
                ALL_PENDING="${PENDING_CHECKS}"
              fi
            fi

            if [ -n "${ALL_PENDING}" ]; then
              echo "The following checks are still pending:"
              echo "${ALL_PENDING}" | while read -r check; do
                echo "  - ${check}"
              done
              echo "Waiting ${POLL_INTERVAL} seconds before next check..."
              sleep ${POLL_INTERVAL}
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
            else
              # All checks are complete and successful
              echo "✅ All checks have passed on main branch!"
              echo "checks_passed=true" >> $GITHUB_OUTPUT
              echo "::endgroup::"
              exit 0
            fi
          done

          # Timeout reached
          echo "::error::Timeout reached while waiting for checks to complete"
          if [ -n "${ALL_PENDING}" ]; then
            echo "::error::The following checks are still pending after ${MAX_WAIT_SECONDS}s:"
            echo "${ALL_PENDING}" | while read -r check; do
              echo "::error::  - ${check}"
            done
          else
            echo "::error::Unable to determine pending checks status"
          fi
          echo "checks_passed=false" >> $GITHUB_OUTPUT
          echo "::endgroup::"
          exit 1

      - name: Sync main to rc branch
        if: steps.check_main_status.outputs.checks_passed == 'true'
        run: |
          echo "::group::Syncing main to rc branch"
          git fetch origin main:main || git fetch origin main
          git checkout rc || git checkout -b rc
          git merge --ff-only main || {
            echo "::error::Failed to fast-forward merge main into rc."
            echo "::error::Manual intervention required."
            exit 1
          }
          git push origin rc
          echo "::endgroup::"

      - name: Check for new commits and determine release necessity
        if: steps.check_main_status.outputs.checks_passed == 'true'
        id: check_commits
        run: |
          echo "::group::Checking for new commits"

          # Generate today's tag name
          TODAY_TAG="v0.$(date +%y.%m%d)"
          echo "today_tag=${TODAY_TAG}" >> $GITHUB_OUTPUT
          echo "Today's tag would be: ${TODAY_TAG}"

          # Check if today's tag already exists
          if git rev-parse "${TODAY_TAG}" >/dev/null 2>&1; then
            REASON="Tag ${TODAY_TAG} already exists for today"
            echo "skip_reason=${REASON}" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::warning::${REASON}. Skipping release creation."
            echo "::endgroup::"
            exit 0
          fi

          # Get the latest pre-release tag (any tag starting with v0.)
          LATEST_TAG=$(git tag -l "v0.*" --sort=-version:refname \
            | head -n 1)

          if [ -z "${LATEST_TAG}" ]; then
            echo "No previous pre-release tags found."
            echo "This will be the first release."
            echo "skip_reason=" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "latest_tag=" >> $GITHUB_OUTPUT
            echo "::endgroup::"
            exit 0
          fi

          echo "Latest pre-release tag: ${LATEST_TAG}"
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

          # Get commit SHAs
          LATEST_TAG_COMMIT=$(git rev-list -n 1 "${LATEST_TAG}")
          RC_HEAD_COMMIT=$(git rev-parse rc)

          echo "Latest tag commit: ${LATEST_TAG_COMMIT}"
          echo "RC branch HEAD: ${RC_HEAD_COMMIT}"

          # Compare commits
          if [ "${LATEST_TAG_COMMIT}" = "${RC_HEAD_COMMIT}" ]; then
            REASON="No new commits since last release (${LATEST_TAG})"
            echo "skip_reason=${REASON}" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::warning::${REASON}. Skipping release creation."
          else
            # Count new commits
            COMMIT_RANGE="${LATEST_TAG_COMMIT}..${RC_HEAD_COMMIT}"
            NEW_COMMIT_COUNT=$(git rev-list --count "${COMMIT_RANGE}")
            echo "Found ${NEW_COMMIT_COUNT} new commit(s) since ${LATEST_TAG}"
            echo "skip_reason=" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

          echo "::endgroup::"

      - name: Create tag
        if: steps.check_main_status.outputs.checks_passed == 'true' && steps.check_commits.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.check_commits.outputs.today_tag }}"
          echo "::group::Creating tag ${TAG}"
          git tag -a "${TAG}" -m "Nightly pre-release ${TAG}"
          git push origin "${TAG}"
          echo "::endgroup::"

      - name: Create GitHub release
        if: steps.check_main_status.outputs.checks_passed == 'true' && steps.check_commits.outputs.should_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.check_commits.outputs.today_tag }}';
            const latestTag = '${{ steps.check_commits.outputs.latest_tag }}';

            // Generate release notes
            let releaseBody = `Nightly pre-release build for ${tag}\n\n`;
            releaseBody += `This is an automated pre-release `;
            releaseBody += `created from the \`rc\` branch.\n\n`;

            if (latestTag) {
              releaseBody += `### Changes since ${latestTag}\n\n`;
              const compareUrl = `https://github.com/` +
                `${context.repo.owner}/${context.repo.repo}/` +
                `compare/${latestTag}...${tag}`;
              releaseBody += `See the [comparison view](${compareUrl})`;
              releaseBody += ` for detailed changes.\n`;
            } else {
              releaseBody += `This is the first pre-release.\n`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Pre-release ${tag}`,
              body: releaseBody,
              draft: false,
              prerelease: true
            });

            const msg = `Successfully created pre-release ${tag}`;
            core.notice(msg);

      - name: Job summary
        if: always()
        run: |
          echo "## Nightly Pre-release Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          CHECKS_OUTCOME="${{ steps.check_main_status.outcome }}"
          CHECKS_PASSED="${{ steps.check_main_status.outputs.checks_passed }}"
          STEP_OUTCOME="${{ steps.check_commits.outcome }}"
          SHOULD_RELEASE="${{ steps.check_commits.outputs.should_release }}"

          # Check if main branch checks failed
          if [ "${CHECKS_OUTCOME}" = "failure" ] || [ "${CHECKS_PASSED}" = "false" ]; then
            echo "❌ **Release Skipped - Checks Failed**" >> "${GITHUB_STEP_SUMMARY}"
            echo "- Required checks on main branch have not passed" >> "${GITHUB_STEP_SUMMARY}"
            echo "- Please review the workflow logs for details" >> "${GITHUB_STEP_SUMMARY}"
            echo "- The rc branch will not be updated until all checks pass" >> "${GITHUB_STEP_SUMMARY}"
          elif [ "${STEP_OUTCOME}" != "success" ]; then
            echo "❌ **Failed to determine release status**" >> "${GITHUB_STEP_SUMMARY}"
            echo "- The check for new commits step may have failed" >> "${GITHUB_STEP_SUMMARY}"
            echo "- Please review the workflow logs for errors" >> "${GITHUB_STEP_SUMMARY}"
          elif [ "${SHOULD_RELEASE}" = "true" ]; then
            TAG="${{ steps.check_commits.outputs.today_tag }}"
            echo "✅ **Release Created**: ${TAG}" >> "${GITHUB_STEP_SUMMARY}"
            LATEST="${{ steps.check_commits.outputs.latest_tag }}"
            if [ -n "${LATEST}" ]; then
              echo "- Previous release: ${LATEST}" >> "${GITHUB_STEP_SUMMARY}"
              echo "- New commits were found" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- This is the first pre-release" >> "${GITHUB_STEP_SUMMARY}"
            fi
          else
            echo "⏭️ **Release Skipped**" >> "${GITHUB_STEP_SUMMARY}"
            REASON="${{ steps.check_commits.outputs.skip_reason }}"
            echo "- Reason: ${REASON}" >> "${GITHUB_STEP_SUMMARY}"
          fi
